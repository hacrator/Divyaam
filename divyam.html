<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Will You Be My Girlfriend?</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Poppins', sans-serif;
    }

    body{
        height:100vh;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg,#ff758c,#ff7eb3);
        position:relative;
    }

    /* Floating Hearts */
    .heart{
        position:absolute;
        bottom:-50px;
        color:rgba(255,255,255,0.7);
        font-size:20px;
        animation:floatUp linear infinite;
        user-select:none;
    }

    @keyframes floatUp{
        0%{
            transform:translateY(0) scale(1);
            opacity:0;
        }

        20%{
            opacity:1;
        }

        100%{
            transform:translateY(-120vh) scale(1.8);
            opacity:0;
        }
    }

    .container{
        text-align:center;
        color:white;
        z-index:10;
    }

    h1{
        font-size:3rem;
        margin-bottom:15px;
        text-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    /* Mehak Message */
    .special-message{
        font-size:1.4rem;
        margin-bottom:35px;
        font-weight:600;
        color:#fff;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow{
        from{
            text-shadow:0 0 10px #fff;
        }
        to{
            text-shadow:0 0 25px #fff, 0 0 40px #ff4d6d;
        }
    }

    .buttons{
        position:relative;
        width:100vw;
        height:300px;
    }

    button{
        padding:14px 35px;
        border:none;
        border-radius:50px;
        font-size:1.2rem;
        cursor:pointer;
        transition:0.2s ease;
        position:absolute;
        box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    #yesBtn{
        left:40%;
        top:120px;
        background:white;
        color:#ff4d6d;
        font-weight:bold;
    }

    #yesBtn:hover{
        transform:scale(1.08);
    }

    #noBtn{
        left:55%;
        top:120px;
        background:#ff4d6d;
        color:white;
        font-weight:bold;
    }

    .result{
        display:none;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        animation:fadeIn 1s ease;
        z-index:10;
        text-align:center;
    }

    .result img{
        width:320px;
        border-radius:20px;
        margin-top:20px;
        box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .result h2{
        font-size:2.5rem;
        color:white;
    }

    .love-link{
        margin-top:20px;
        text-decoration:none;
        background:white;
        color:#ff4d6d;
        padding:12px 25px;
        border-radius:30px;
        font-weight:bold;
        transition:0.3s;
    }

    .love-link:hover{
        transform:scale(1.08);
        background:#ffe5ec;
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:scale(0.8);
        }
        to{
            opacity:1;
            transform:scale(1);
        }
    }
</style>
</head>

<body>

<div class="container" id="mainBox">

    <h1>Will You Be My Girlfriend? ❤️</h1>

    <!-- CENTER MESSAGE -->
    <div class="special-message">
        💖 Mehak, You Are The Most Special Person In My Life 💖
    </div>

    <div class="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 💔</button>
    </div>
</div>

<div class="result" id="resultBox">

    <h2>Yayyyy Mehak Said YES ❤️🥹</h2>

    <!-- Couple GIF -->
    <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" alt="Couple GIF">

    <!-- CLICKABLE LINK -->
    <a class="love-link" href="https://youtu.be/QBbIut6ZXfQ?si=9kNfR32Cj4lOicrR" target="_blank">
        🎵 Click Here For Our Song
    </a>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const mainBox = document.getElementById("mainBox");
const resultBox = document.getElementById("resultBox");

// Function to move NO button randomly
function moveNoButton(){

    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    const randomX = Math.floor(Math.random() * maxX);
    const randomY = Math.floor(Math.random() * maxY);

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

// Move continuously when cursor gets close
noBtn.addEventListener("mouseover", moveNoButton);

noBtn.addEventListener("click", (e)=>{
    e.preventDefault();
    moveNoButton();
});

// YES button clicked
yesBtn.addEventListener("click", () => {
    mainBox.style.display = "none";
    resultBox.style.display = "flex";
});

// Create floating hearts
function createHeart(){

    const heart = document.createElement("div");
    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";

    heart.style.fontSize = (Math.random() * 20 + 15) + "px";

    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

// Generate hearts continuously
setInterval(createHeart, 250);

</script>

</body>
</html>
